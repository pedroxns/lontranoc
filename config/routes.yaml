frigate:
  keywords:
    frigate: 10
    camera: 5
    câmera: 5
    câmeras: 5
    cameras: 5
    nvr: 7
    rtsp: 7
    ffmpeg: 6
    cachorro: 8
    cachorros: 8
    dog: 8
    dogs: 8
    pessoa: 6
    person: 6
    carro: 6
    car: 6

  queries:
    health:
      keywords:
        houve: 4
        aconteceu: 4
        problema: 8
        erro: 8
        falha: 8
        ffmpeg: 8
        rtsp: 8
        offline: 7
        timeout: 7
      sql: |
        SELECT event_type, severity, component, camera, subsystem,
               error_reason, message, service
        FROM frigate
        WHERE severity IN ('warning', 'error', 'critical')
        ORDER BY _timestamp DESC
        LIMIT 50

    detection:
      keywords:
        detecção: 8
        deteccao: 8
        pessoa: 8
        person: 8
        carro: 8
        car: 8
        cachorro: 10
        cachorros: 10
        dog: 10
        dogs: 10
        animal: 7
        animais: 7
        objeto: 7
        object: 7
        movimento: 6
        motion: 6
      sql: |
        SELECT service, event_type, severity, component, camera, label,
               score, top_score, message
        FROM frigate
        WHERE component = 'detection'
        ORDER BY _timestamp DESC
        LIMIT 50

    default:
      sql: |
        SELECT *
        FROM frigate
        ORDER BY _timestamp DESC
        LIMIT 50

